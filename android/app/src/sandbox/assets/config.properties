# Sandbox flavor: local emulator stack, local dev-JWT auth.
# The LOCAL_AUTH_TOKEN is stamped into a generated config.local.properties
# asset at build time (StampSandboxConfigTask) from web/app/.env.local
# (npm run bootstrap:env). Never commit a token here.
APP_NAME=
GRAPHQL_URL=http://127.0.0.1:5001/demo-repobot-base/us-central1/graphql__request__api
AUTH_MODE=local
AUTH_METHODS=email-code
AUTH_REDIRECT_URL=baseapp-sandbox://auth/callback
