			shellPath = /bin/sh;
			shellScript = "if [ \"$FLAVOR\" != \"sandbox\" ]; then\n  exit 0\nfi\n\nSANDBOX_CONFIG_PATH=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Config.sandbox.plist\"\nif [ ! -f \"$SANDBOX_CONFIG_PATH\" ]; then\n  echo \"[ios:sandbox-config] Skipping stamp (missing $SANDBOX_CONFIG_PATH).\"\n  exit 0\nfi\n\n# 1. Stamp the local dev JWT from web/app/.env.local (npm run bootstrap:env).\nENV_LOCAL_PATH=\"${SRCROOT}/../web/app/.env.local\"\nLOCAL_AUTH_TOKEN=\"\"\nif [ -f \"$ENV_LOCAL_PATH\" ]; then\n  LOCAL_AUTH_TOKEN=\"$(grep '^VITE_LOCAL_AUTH_TOKEN=' \"$ENV_LOCAL_PATH\" | head -n 1 | cut -d= -f2-)\"\nfi\nif [ -z \"$LOCAL_AUTH_TOKEN\" ]; then\n  echo \"[ios:sandbox-config] warning: no VITE_LOCAL_AUTH_TOKEN found; run 'npm run bootstrap:env' at the repo root.\"\nfi\n\n# 2. Rewrite localhost hosts to the Mac's LAN IP so physical devices can\n#    reach the emulators. Simulators work with 127.0.0.1 either way.\nLOCAL_IP=\"$(ipconfig getifaddr en0 2>/dev/null || true)\"\nif [ -z \"$LOCAL_IP\" ]; then\n  LOCAL_IP=\"$(ipconfig getifaddr en1 2>/dev/null || true)\"\nfi\n\npython3 - \"$SANDBOX_CONFIG_PATH\" \"$LOCAL_AUTH_TOKEN\" \"$LOCAL_IP\" <<'PY'\nimport plistlib\nimport sys\nfrom urllib.parse import urlparse, urlunparse\n\nconfig_path = sys.argv[1]\nlocal_auth_token = sys.argv[2]\nlocal_host = sys.argv[3] if len(sys.argv) > 3 else \"\"\n\nwith open(config_path, \"rb\") as file:\n    config = plistlib.load(file)\n\nif local_auth_token:\n    config[\"LOCAL_AUTH_TOKEN\"] = local_auth_token\n\n\ndef rewrite_url_host(raw_url: str) -> str:\n    parsed = urlparse(raw_url)\n    if parsed.hostname in (\"127.0.0.1\", \"localhost\") and local_host:\n        netloc = local_host\n        if parsed.port is not None:\n            netloc = f\"{local_host}:{parsed.port}\"\n        return urlunparse((\n            parsed.scheme,\n            netloc,\n            parsed.path,\n            parsed.params,\n            parsed.query,\n            parsed.fragment,\n        ))\n    return raw_url\n\nvalue = config.get(\"GRAPHQL_URL\")\nif isinstance(value, str) and value:\n    config[\"GRAPHQL_URL\"] = rewrite_url_host(value)\n\nwith open(config_path, \"wb\") as file:\n    plistlib.dump(config, file)\n\nprint(\"[ios:sandbox-config] Stamped sandbox config (token %s, host %s)\" % (\n    \"present\" if local_auth_token else \"missing\",\n    local_host or \"unchanged\",\n))\nPY\n";
