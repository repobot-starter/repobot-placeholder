# Android builds for Repobot previews and device installs. Dispatched by the
# Repobot platform (AndroidBuildService) via the GitHub App — not triggered on
# push. Twin of ios-build.yml, but on Linux runners.
#
# kind=emulator: dev-flavor debug APK, published as the "emulator-apk" run
#   artifact. The platform downloads the artifact when the run succeeds and
#   uploads it to Appetize server-side — no Appetize credentials ever enter
#   this repository.
# kind=apk: dev-flavor release APK signed with the platform-managed
#   per-project keystore (ANDROID_KEYSTORE_* repo secrets, injected by the
#   platform at dispatch and removed when the build concludes), published as
#   the "signed-apk" run artifact. The platform downloads it and serves it
#   from its own storage as a direct install link + QR.
#
# Config values (app name, GraphQL endpoint) are stamped into
# android/app/src/development/assets/config.properties from the dispatch
# inputs; the platform sources them from the environment's provisioned
# infrastructure. The auth endpoint is derived from the GraphQL URL at
# runtime (same functions origin).
name: Android Build
run-name: "Android ${{ inputs.kind }} build ${{ inputs.build_id }}"

on:
    workflow_dispatch:
        inputs:
            kind:
                description: "Build kind"
                required: true
                type: choice
                options: [emulator, apk]
            build_id:
                description: "Platform AndroidBuild id (correlates the run to the build record)"
                required: true
                type: string
            app_name:
                description: "Display name stamped into the app"
                required: true
                type: string
            # Backend config inputs are optional: client-only packs
            # legitimately build with empty values, and GitHub's dispatch API
            # rejects an empty string for a `required: true` input as "not
            # provided" (422).
            graphql_url:
                description: "GraphQL endpoint of the target environment (empty for client-only apps)"
                required: false
                type: string
                default: ""
            application_id:
                description: "Android application id (apk builds; derived from deploySlug)"
                required: false
                type: string
                default: ""

permissions:
    contents: read

jobs:
    emulator:
        if: inputs.kind == 'emulator'
        name: Emulator build + artifact publish
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
            - name: Regenerate GraphQL schema (composed from this checkout)
              run: cd android && ./prebuild.sh
            - name: Stamp dev config
              env:
                  APP_NAME: ${{ inputs.app_name }}
                  GRAPHQL_URL: ${{ inputs.graphql_url }}
              run: python3 scripts/lib/stamp-android-config.py android/app/src/development/assets/config.properties
            - name: Build (debug, emulator)
              run: |
                  cd android && ./gradlew :app:assembleDevelopmentDebug \
                      -PappDisplayName="${{ inputs.app_name }}"
            - name: Package APK
              run: |
                  APK_PATH="$(find android/app/build/outputs/apk/development/debug -name '*.apk' | head -n 1)"
                  test -n "$APK_PATH" || { echo "No APK produced"; exit 1; }
                  cp "$APK_PATH" app.apk
            - name: Publish emulator APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: emulator-apk
                  path: app.apk

    apk:
        if: inputs.kind == 'apk'
        name: Signed APK build + artifact publish
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
            - name: Regenerate GraphQL schema (composed from this checkout)
              run: cd android && ./prebuild.sh
            - name: Stamp dev config
              env:
                  APP_NAME: ${{ inputs.app_name }}
                  GRAPHQL_URL: ${{ inputs.graphql_url }}
              run: python3 scripts/lib/stamp-android-config.py android/app/src/development/assets/config.properties
            - name: Materialize signing keystore
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
              run: |
                  test -n "$ANDROID_KEYSTORE_BASE64" || { echo "ANDROID_KEYSTORE_BASE64 secret is not set (platform injects it at dispatch)"; exit 1; }
                  echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/app.keystore"
            - name: Build (signed release)
              env:
                  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  APP_APPLICATION_ID: ${{ inputs.application_id }}
              run: |
                  test -n "$APP_APPLICATION_ID" || { echo "application_id input is required for apk builds"; exit 1; }
                  export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/app.keystore"
                  cd android && ./gradlew :app:assembleDevelopmentRelease \
                      -PappApplicationId="$APP_APPLICATION_ID" \
                      -PappDisplayName="${{ inputs.app_name }}"
            - name: Package APK
              run: |
                  APK_PATH="$(find android/app/build/outputs/apk/development/release -name '*.apk' | head -n 1)"
                  test -n "$APK_PATH" || { echo "No APK produced"; exit 1; }
                  cp "$APK_PATH" app.apk
            - name: Publish signed APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: signed-apk
                  path: app.apk
